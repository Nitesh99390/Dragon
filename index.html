<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Master: Developer Edition</title>
    <style>
        :root { --primary: #00ffcc; --danger: #ff3366; --bg: #0f0f1a; }
        body {
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-area {
            position: relative;
            width: 350px;
            height: 450px;
            background: #1a1a2e;
            border: 3px solid #333;
            border-radius: 15px;
            overflow: hidden;
            touch-action: none; /* Mobile scroll block karne ke liye */
        }

        #player {
            width: 80px;
            height: 15px;
            background: var(--primary);
            position: absolute;
            bottom: 20px;
            left: 135px;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary);
            cursor: grab;
        }

        #player:active { cursor: grabbing; }

        .item { width: 20px; height: 20px; position: absolute; border-radius: 50%; }
        .good { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        #ui-panel { margin-bottom: 10px; font-size: 20px; }

        /* Code Injector Styles */
        #dev-panel {
            margin-top: 30px;
            width: 350px;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            color: #0f0;
            border: 1px solid #555;
            font-family: monospace;
            margin-top: 10px;
            border-radius: 5px;
        }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-start { background: var(--primary); color: #000; }
        .btn-inject { background: #ffcc00; color: #000; }
    </style>
</head>
<body>

    <div id="ui-panel">Score: <span id="score">0</span></div>

    <div id="game-area" id="main-container">
        <div id="player"></div>
    </div>

    <button class="btn btn-start" onclick="startGame()">START GAME</button>

    <div id="dev-panel">
        <strong>🛠️ Developer Mode</strong><br>
        <small>Yahan apna naya game code paste karein:</small>
        <textarea id="customCode" placeholder="Paste your <script> or HTML here..."></textarea>
        <button class="btn btn-inject" onclick="injectCode()">Insert & Run Code</button>
    </div>

    <script>
        const gameArea = document.getElementById("game-area");
        const player = document.getElementById("player");
        const scoreEl = document.getElementById("score");
        
        let score = 0;
        let gameActive = false;
        let isDragging = false;

        // --- Drag Logic ---
        function moveHandler(e) {
            if (!isDragging || !gameActive) return;
            
            let rect = gameArea.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let x = clientX - rect.left - (player.offsetWidth / 2);

            if (x < 0) x = 0;
            if (x > gameArea.offsetWidth - player.offsetWidth) x = gameArea.offsetWidth - player.offsetWidth;
            
            player.style.left = x + "px";
        }

        player.addEventListener("mousedown", () => isDragging = true);
        player.addEventListener("touchstart", () => isDragging = true);
        window.addEventListener("mouseup", () => isDragging = false);
        window.addEventListener("touchend", () => isDragging = false);
        window.addEventListener("mousemove", moveHandler);
        window.addEventListener("touchmove", moveHandler);

        // --- Game Logic ---
        function startGame() {
            if(gameActive) return;
            score = 0;
            scoreEl.innerText = score;
            gameActive = true;
            spawnItem();
        }

        function spawnItem() {
            if (!gameActive) return;
            const item = document.createElement("div");
            item.className = "item good";
            item.style.left = Math.random() * (gameArea.offsetWidth - 20) + "px";
            item.style.top = "0px";
            gameArea.appendChild(item);

            let posY = 0;
            function fall() {
                if (!gameActive) { item.remove(); return; }
                posY += 4;
                item.style.top = posY + "px";

                let pRect = player.getBoundingClientRect();
                let iRect = item.getBoundingClientRect();

                if (iRect.bottom >= pRect.top && iRect.left < pRect.right && iRect.right > pRect.left) {
                    score++;
                    scoreEl.innerText = score;
                    item.remove();
                    return;
                }

                if (posY > 450) {
                    gameActive = false;
                    alert("Game Over! Score: " + score);
                    item.remove();
                    return;
                }
                requestAnimationFrame(fall);
            }
            requestAnimationFrame(fall);
            setTimeout(spawnItem, 1000);
        }

        // --- Code Injector Logic ---
        function injectCode() {
            const code = document.getElementById("customCode").value;
            if (!code.trim()) {
                alert("Pehle textarea mein code toh daalo!");
                return;
            }

            // Purane game ko stop karna
            gameActive = false;
            
            // Naye elements ya script inject karna
            const wrapper = document.createElement('div');
            wrapper.innerHTML = code;
            
            // Agar script tag hai toh use execute karna padega manually
            const scripts = wrapper.getElementsByTagName('script');
            for (let i = 0; i < scripts.length; i++) {
                const newScript = document.createElement('script');
                newScript.text = scripts[i].text;
                document.body.appendChild(newScript);
            }
            
            // HTML content ko area mein daalna
            gameArea.innerHTML = wrapper.innerHTML;
            alert("Naya code inject ho gaya!");
        }
    </script>
</body>
</html>
